# Human-in-the-Loop 审批工作流 v1.0.0
# 程序记忆 · 对应 v17 §2.11 HITL（新增）
# 来源：2026 HITL Approval Flow Pattern + EU AI Act 合规
---
version: 1.0.0
component: hitl_approval_flow
name: 人机协同审批工作流

# 核心理念：非对称自治
# 低风险操作 = Agent 自主执行
# 高风险操作 = 必须人工审批
# 来源：2026 企业级 Agent 可控执行阶梯

# 自治级别（5 级阶梯）
autonomy_levels:
  - level: 1
    name: 全人工
    desc: Agent 仅建议，人工执行
    scope: "战略决策/合同条款"
  - level: 2
    name: 人工审批后执行
    desc: Agent 准备 → 人工审批 → Agent 执行
    scope: "CRM 写操作/对外邮件发送/报价发出"
  - level: 3
    name: 执行后人工复核
    desc: Agent 执行 → 人工抽检
    scope: "客户洞察报告/行业分析"
  - level: 4
    name: 异常时人工介入
    desc: Agent 自主执行，异常时暂停人工
    scope: "日常跟进/话术生成/周报"
  - level: 5
    name: 全自主
    desc: Agent 完全自主，事后可审计
    scope: "数据查询/评分计算/归档"

# 审批触发条件
approval_triggers:
  - id: high_value_action
    condition: "操作影响 > 10万元商机"
    autonomy_level: 2
    action: "暂停 + 推送审批请求"
  - id: external_communication
    condition: "对外发送邮件/消息"
    autonomy_level: 2
    action: "暂停 + 预览审批"
  - id: crm_write
    condition: "CRM 写操作（创建/修改/删除）"
    autonomy_level: 2
    action: "暂停 + 变更预览审批"
  - id: quality_below_threshold
    condition: "质量自查 < 6.0"
    autonomy_level: 1
    action: "不交付 + 请求人工指导"
  - id: input_required
    condition: "A2A 状态机 → input_required"
    autonomy_level: 2
    action: "推送输入请求 + 暂停"
  - id: ambiguous_intent
    condition: "用户意图不明确（置信度 < 0.7）"
    autonomy_level: 2
    action: "提供选项 + 请求确认"

# 审批流程
approval_flow:
  - id: 1
    name: prepare
    desc: Agent 准备操作 + 生成预览
  - id: 2
    name: request_approval
    desc: 推送审批请求（含操作摘要+预览+风险标注）
    timeout: 300    # 5 分钟超时
  - id: 3
    name: wait_decision
    desc: 等待人工决策
    branches:
      - condition: approved
        action: execute
      - condition: rejected
        action: abort + 记录反馈
      - condition: modified
        action: apply_modifications + execute
      - condition: timeout
        action: escalate or abort
  - id: 4
    name: execute
    desc: 执行已审批操作
  - id: 5
    name: log
    desc: 审批记录写入 trace（谁审批/何时/修改了什么）

# 审批通知格式
approval_notification:
  format: |
    🔔 审批请求：{action_summary}
    风险级别：{risk_level}
    影响范围：{impact_scope}
    操作预览：{preview}
    请：[批准] / [拒绝] / [修改后批准]
    超时：{timeout}秒后自动{timeout_action}

# 与 v17 组件咬合
integration:
  a2a_state_machine: "input_required 状态触发 HITL"
  security_guardrails: "工具沙箱写操作需 HITL 审批"
  evolution_bus: "用户 reject/modify → 触发 user_correction 事件 → 自进化"
  observability: "审批记录写 trace（合规审计）"
  moa: "MoA 综合方案的分歧点 → 可选触发 HITL 人工裁决"

# EU AI Act 合规
compliance:
  logging: "所有审批决策必须可审计"
  transparency: "用户有权知道 Agent 做了什么"
  human_oversight: "高风险场景必须有人工监督"

evolution:
  last_modified: 2026-07-19
  last_event: initial_creation
  eval_status: pending
  parent_version: null
