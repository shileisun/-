# 版本管理规则
versioning_rules:
  - rule: semver 严格（major.minor.patch）
  - rule: 每次自进化改写必须升号
  - rule: 旧版归档到 procedural/archive/
  - rule: 回滚时恢复 archive 中最近通过评测的版本

# 评测门控状态机
eval_state_machine:
  - state: pending
    desc: 新建/改写后待评测
  - state: passed
    desc: 评测通过，可固化
  - state: failed
    desc: 评测未通过，丢弃候选
  - state: rolled_back
    desc: 回归后回滚到上版

